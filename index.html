<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PIKO-SUUJI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">

    <section id="titleScreen" class="screen active">
      <div class="egg">🥚</div>

      <h1>PIKO-SUUJI</h1>
      <p class="subtitle">きょうりゅうたんけん</p>

      <div class="doctor-card">
        <img src="images/Dr.uroko.png" alt="Dr.うろこ" class="doctor-img" />
        <div class="speech">
          <p id="titleDoctorText">やあ！ぼくは Dr.うろこ！</p>
        </div>
      </div>

      <div class="buttons">
        <button class="main-btn" onclick="speakIntro()">🔊 はかせの声をきく</button>
        <button class="start-btn" onclick="goNext()">🦖 はじめる</button>
      </div>

      <p class="note">Ver.0.2 名前登録</p>
    </section>

    <section id="nameScreen" class="screen">
      <h2>おなまえを<br>おしえてね</h2>

      <div class="name-card">
        <div class="mini-doctor">
          <img src="images/Dr.uroko.png" alt="Dr.うろこ" />
        </div>

        <div class="speech">
          <p>ぼくは Dr.うろこ！<br>きみの名前を教えてね。</p>
        </div>

        <input id="nameInput" class="name-input" type="text" value="しゅり" maxlength="8" />

        <div class="suffix-row">
          <button id="kunBtn" class="suffix-btn selected" onclick="selectSuffix('くん')">くん</button>
          <button id="chanBtn" class="suffix-btn" onclick="selectSuffix('ちゃん')">ちゃん</button>
          <button id="sanBtn" class="suffix-btn" onclick="selectSuffix('さん')">さん</button>
        </div>

        <button class="start-btn" onclick="savePlayerName()">これでOK</button>
      </div>
    </section>

    <section id="homeScreen" class="screen">
      <div class="egg">🥚</div>

      <h1>PIKO-SUUJI</h1>
      <p class="subtitle">きょうりゅうたんけん</p>

      <div class="doctor-card">
        <img src="images/Dr.uroko.png" alt="Dr.うろこ" class="doctor-img" />
        <div class="speech">
          <p id="homeDoctorText">おかえり！</p>
        </div>
      </div>

      <div class="buttons">
        <button class="main-btn" onclick="speakWelcome()">🔊 よびかけをきく</button>
        <button class="start-btn" onclick="startAdventure()">🦖 たんけんする</button>
        <button class="small-btn" onclick="resetName()">なまえをかえる</button>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
